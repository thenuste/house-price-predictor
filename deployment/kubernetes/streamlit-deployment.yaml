# streamlit-deployment.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: streamlit
  labels:
    app: streamlit
spec:
  replicas: 1
  selector:
    matchLabels:
      app: streamlit
  template:
    metadata:
      labels:
        app: streamlit
    spec:
      containers:
        - name: streamlit
          image: thenuste/hpp-streamlit:v1.0
          ports:
            - containerPort: 8501
          env:
            - name: API_URL
              value: "http://fastapi:8000"
---
apiVersion: v1
kind: Service

metadata:
  name: streamlit
spec:
  type: NodePort
  selector:
    app: streamlit
  ports:
    - protocol: TCP
      port: 8501
      targetPort: 8501
      nodePort: 30000