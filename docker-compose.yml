services:
  fastapi:
    image: thenuste/hpp-fastapi:v1.0
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
  streamlit:
    image: thenuste/hpp-streamlit:v1.0
    build:
      context: ./streamlit_app
      dockerfile: Dockerfile
    ports:
      - "8501:8501"
    environment:
      API_URL: http://fastapi:8000
     