name: ML Ops CI
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
jobs:
  model-training:
    environment: test_env
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v6

    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.11.15'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run Data Processing
      run: |
        python src/data/run_processing.py \
        --input data/raw/house_data.csv  \
        --output data/processed/cleaned_house_data.csv
    
    - name: Run Feature Engineering
      run: |
        python src/features/engineer.py \
        --input data/processed/cleaned_house_data.csv \
        --output data/processed/featured_house_data.csv \
        --preprocessor models/trained/preprocessor.pkl
    
    - name: Start MLflow Tracking Server
      run: |
        docker compose -f deployment/mlflow/docker-compose.yaml up -d
    
    - name: Run Model Training
      run: |
        python src/models/train_model.py \
        --config configs/model_config.yaml \
        --data data/processed/featured_house_data.csv \
        --models-dir models \
        --mlflow-tracking-uri http://localhost:5555
   
    - name: Stop MLflow Tracking Server
      run: |
        docker compose -f deployment/mlflow/docker-compose.yaml down
    
    - name: Login to Docker Hub
      uses: docker/login-action@v4
      with:
        username: ${{ vars.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}
    
    - name: Set up QEMU
      uses: docker/setup-qemu-action@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v4
      
    - name: Build and push FastAPI Docker image
      uses: docker/build-push-action@v7
      with:
        context: .
        push: true
        tags: thenuste/hpp-fastapi:v1.1
    
    - name: Build and push Streamlit Docker image
      uses: docker/build-push-action@v7
      with:
        context: ./streamlit_app/
        push: true
        tags: thenuste/hpp-streamlit:v1.1